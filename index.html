<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>⋆.˚✿🌷fairy worlds🌷✿˚.⋆</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="world-hud" class="hud-panel" hidden>
      <div class="hud-line">click canvas to look · WASD to move · shift = fast · ctrl = slow</div>
      <button id="btn-home" class="home-btn" aria-label="home">✿</button>
    </div>

    <div id="home-hud" class="hud-panel" hidden>
      <div class="hud-line hud-heading" hidden>✿ fairy worlds ✿</div>
      <button id="btn-change-character" class="hud-btn">♡ pick a character ♡</button>
    </div>

    <div id="companion" hidden>
      <div id="companion-bubble" class="companion-bubble" hidden></div>
      <canvas id="companion-canvas"></canvas>
    </div>

    <div id="character-picker" class="picker-modal" hidden>
      <div class="picker-backdrop"></div>
      <div class="picker-card">
        <button id="picker-close" class="picker-close" aria-label="close">✕</button>
        <div class="picker-heading">✧ ✶⋆.˚⋆˚꩜｡✧</div>
        <div id="picker-gallery" class="picker-gallery"></div>
        <div id="picker-customization" class="picker-customization"></div>
      </div>
    </div>

    <nav id="scenes"></nav>

    <div id="loader" hidden>
      <div id="sparkle-field"></div>
      <div class="loader-card">
        <div class="loader-heading">♡ loading ♡</div>
        <div class="loader-title">…</div>
        <div class="loader-bar"><div class="loader-bar-fill"></div></div>
        <div class="loader-pct">0%</div>
      </div>
    </div>

    <div id="transition-overlay" hidden>
      <div id="transition-sparkle-field"></div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
